name: Publish release on version bump

# Publishes a release ONLY when pack.toml's version is bumped to one not released
# before. Bumping the version and pushing IS the release trigger. A new release
# always carries a stable download URL:
#   https://github.com/KnightCraft-5/knightcraft-5/releases/latest/download/KnightCraft5.zip

on:
  push:
    branches: [master]
    paths: ['pack.toml']
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if this version was already released'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version, decide whether to publish
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -m1 '^version' pack.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force requested — will publish v$VERSION."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already released — nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.check.outputs.publish == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        if: steps.check.outputs.publish == 'true'
        run: go install github.com/packwiz/packwiz@latest

      - name: Export CurseForge zip
        id: export
        if: steps.check.outputs.publish == 'true'
        run: |
          V="${{ steps.check.outputs.version }}"
          "$(go env GOPATH)/bin/packwiz" curseforge export -o "KnightCraft5-${V}.zip"
          cp "KnightCraft5-${V}.zip" KnightCraft5.zip   # constant name -> stable latest URL

      - name: Extract changelog notes for this version
        id: notes
        if: steps.check.outputs.publish == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          awk -v hdr="## v$VERSION" '
            $0==hdr {f=1; next}
            f && /^## / {exit}
            f {print}
          ' CHANGELOG.md > notes.md
          # strip leading/trailing blank lines; fall back if empty
          sed -i -e '/./,$!d' notes.md
          [ -s notes.md ] || echo "(Sürüm notu eklenmedi.)" > notes.md
          DL="https://github.com/${REPO}/releases/latest/download/KnightCraft5.zip"
          {
            cat notes.md
            echo
            echo "📥 İNDİRME LİNK: $DL"
            echo "CurseForge uygulamasında: Create Custom Profile → Import."
          } > release_body.md

      - name: Publish release
        if: steps.check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: KnightCraft 5 v${{ steps.check.outputs.version }}
          files: |
            KnightCraft5-${{ steps.check.outputs.version }}.zip
            KnightCraft5.zip
          body_path: release_body.md

      - name: Notify Discord
        if: steps.check.outputs.publish == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.check.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK secret set — skipping notification."
            exit 0
          fi
          DL="https://github.com/${REPO}/releases/latest/download/KnightCraft5.zip"
          jq -n --arg v "$VERSION" --arg dl "$DL" --rawfile notes notes.md '{
            content: ("**KnightCraft 5 Güncelleme v\($v)** @here @everyone\n\n📥 İNDİRME LİNK: \($dl)"),
            allowed_mentions: { parse: ["everyone"] },
            embeds: [ { title: "Sürüm Notları", description: $notes, color: 16766720 } ]
          }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
