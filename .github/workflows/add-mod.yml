name: Add a mod

# Lets anyone add a mod without a terminal: Actions -> "Add a mod" -> Run workflow
# -> paste the CurseForge link. It writes the mod's packwiz metadata and commits.
# Afterwards: Pull in GitHub Desktop, then run refresh-mods to download the jar.

on:
  workflow_dispatch:
    inputs:
      mod:
        description: 'CurseForge link or name (e.g. https://www.curseforge.com/minecraft/mc-mods/jei  — or just: jei)'
        required: true

permissions:
  contents: write

concurrency: pack-edit   # avoid two mod edits racing on a push

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Add mod
        env:
          MOD: ${{ inputs.mod }}
        run: "$(go env GOPATH)/bin/packwiz curseforge add \"$MOD\" -y"

      - name: Commit & push
        env:
          MOD: ${{ inputs.mod }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes — that mod is probably already in the pack."
            exit 0
          fi
          git add -A
          git commit -m "Add mod: $MOD"
          git push
